<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="This is a very simple website made by yours truly">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="timer.css">
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>


<body id="body">
    <div class="gradient-div"></div>
    <nav>
       
        <div id="tasksToggle"><img class="task-icon" alt="Tasks toggle">Set Tasks</div>
        
        <div class="game-link"><a href="game.html" target="_blank" rel="noopener noreferrer">Take A Break</a> </div>
        <!-- Rounded switch -->
        <div >
            <label class="switch">
                <input id="modeInput" type="checkbox">
                
                <span class="slider round"></span>
            </label>
            <p id="modeTitle">Mint Choco</p>
        </div>
    </nav>
    
    <div class="background-grid"></div>

    <div class="tasks-div" >
        
       
       <div class="task-container">
            <div id="taskTitle" class="task-title">
            <h2>Tasks</h2>
            <input type="text" id="taskInput" placeholder="Add a task...">
            <span onclick= "newTask()" class="addBtn">Add</span>
            
            </div>

            <ul id="myTaskList">
            <li class="checked">Get Started...</li>
            <li>Finish!</li>
            </ul>
        </div>


    </div>

    <div class="container">
        <div> <p class="disclaimer"> * Long break starts after every fourth session</p> </div>
        <div class="timer-wrapper">
            
                <circle id="progress"></circle>
            

            <div class="timer-display">
                <div class="time" id="timeDisplay"> 25:00</div>
                <div class="session-type" id="sessionType">Work Session</div>


            </div>
        </div>

        <div class="controls">
            <button class="btn primary" id="startBtn">Start</button>
            <button class="btn" id="pauseBtn">Pause</button>
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="skipBtn">Skip</button>
        </div>

        <div class="settings">
            <div class="setting-group">
                <div class="setting-label">Work</div>
                <div class="setting-controls">
                    <button class="setting-btn" id="workMinus">-</button>
                    <div class="setting-value" id="workTime">25</div>
                    <button class="setting-btn" id="workPlus">+</button>
                </div>
            </div>
            <div class="setting-group">
                <div class="setting-label">Break</div>
                <div class="setting-controls">
                    <button class="setting-btn" id="breakMinus">-</button>
                    <div class="setting-value" id="breakTime">5</div>
                    <button class="setting-btn" id="breakPlus">+</button>
                </div>
            </div>
            <div class="setting-group">
                <div class="setting-label">Long Break </div>
                <div class="setting-controls">
                    <button class="setting-btn" id="longBreakMinus">-</button>
                    <div class="setting-value" id="longBreakTime">15</div>
                    <button class="setting-btn" id="longBreakPlus">+</button>
                </div>
            </div>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="completedSessions">0</div>
                <div class="stat-label"> Completed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTime">0h 0m</div>
                <div class="stat-label"> Total Time</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="currentStreak">0</div>
                <div class="stat-label"> Streak</div>
            </div>
        </div>

    </div>
    <div class="notification" id="notification">
        <div id="notificationText">Session Completed</div>
    </div>


</body>

</html>
